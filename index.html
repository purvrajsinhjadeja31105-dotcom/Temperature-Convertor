<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 2</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1 class="heading">Temperature Converter</h1>
    <div class="temp-container">
      <label for="celsius">Celsius: </label>
      <input type="number" placeholder="Enter Temperature" id="celsius" class="input" name="celsius" onchange="calcTemp(event)">
    </div>

    <div class="temp-container">
      <label for="fahrenheit">Fahrenheit: </label>
      <input type="number" placeholder="Enter Temperature" id="fahrenheit" class="input" name="fahrenheit" onchange="calcTemp(event)">
    </div>

    <div class="temp-container">
      <label for="kelvin">Kelvin: </label>
      <input type="number" placeholder="Enter Temperature" id="kelvin" class="input" name="kelvin" onchange="calcTemp(event)">
    </div>


  </div>
  <script src="index.js"></script>
</body>

</html>
